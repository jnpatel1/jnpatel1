name: generate snake

on:
  schedule:
    - cron: "0 0 * * *"   # runs daily at midnight UTC
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: isitreallyalive/snkgen@v3.3.0
        with:
          github_user_name: jnpatel1
          outputs: |
            output/dark.svg?palette=github-dark&color_snake=#ffffff
            output/light.svg?palette=github&color_snake=#000000

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
